services:
  db:
    image: mariadb:10.11
    container_name: sentinel_db_container
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: America/Bogota
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: sentinel_web_container
    restart: always
    env_file:
      - .env
    environment:
      TZ: America/Bogota
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data: